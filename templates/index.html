{% extends "layout.html" %}
{% block content %}
<style>
    .hero-section {
        /* Multi-shade Glassmorphism gradient */
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    /* Animation for the pulsating glow effect */
    @keyframes glowPulse {
        0% { box-shadow: 0 0 10px rgba(240, 147, 251, 0.5); }
        50% { box-shadow: 0 0 30px rgba(245, 87, 108, 0.9), 0 0 50px rgba(240, 147, 251, 0.7); }
        100% { box-shadow: 0 0 10px rgba(240, 147, 251, 0.5); }
    }

    .btn-glow-pulse {
        animation: glowPulse 2s infinite ease-in-out;
        border: 1px solid rgba(255, 255, 255, 0.4) !important;
    }
    /* Hover effect for the hero section */
    .hero-section:hover {
        transform: translateY(-5px);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    }
    /* Deployment-ready responsive adjustments */
    @media (max-width: 768px) {
        .hero-section {
            padding: 2rem 1rem !important;
        }
        .hero-title {
            font-size: 2.5rem;
        }
    }

    /* Smooth transition for all interactive elements */
    * {
        transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    }

    @keyframes emojiGlow {
        0% { text-shadow: 0 0 5px #fff; transform: scale(1); }
        50% { text-shadow: 0 0 20px #ff9966, 0 0 35px #ff5e62; transform: scale(1.25); }
        100% { text-shadow: 0 0 5px #fff; transform: scale(1); }
    }

    .emoji-glow {
        display: inline-block;
        animation: emojiGlow 2.5s infinite ease-in-out;
    }
</style>
<div class="p-5 mb-4 hero-section text-center">
    <div class="container-fluid py-5">
        <h1 class="display-4 fw-bold hero-title"><span class="emoji-glow">✨</span> Plan Your Perfect Event <span class="emoji-glow">✨</span></h1>
        <p class="col-md-12 fs-4 opacity-75">From birthdays to weddings, we help you manage venues, vendors, and budgets in one premium experience.</p>
        <div class="mt-4">
            <a href="/signup" class="nav-link nav-btn-party btn-signup-party btn-glow-pulse d-inline-block px-5 py-3 fs-5">Get Started</a>
        </div>
    </div>
</div>
{% endblock %}
