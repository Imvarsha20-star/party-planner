<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Party Planner{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="brand"><strong>Party Planner</strong></div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/budget">Budget</a>
            <a href="/vendors">Vendors</a>
            <a href="/suggestions">Suggestions</a>
            <a href="/admin">Admin</a>
        </nav>
    </header>

    <div class="party-balls">
        <span style="top: 20%; left: 15%; background: #ff3c78; animation-duration: 7s;"></span>
        <span style="top: 40%; left: 80%; background: #ffd700; animation-duration: 9s;"></span>
        <span style="top: 60%; left: 30%; background: #00e5ff; animation-duration: 6.5s;"></span>
        <span style="top: 75%; left: 60%; background: #7c4dff; animation-duration: 8.2s;"></span>
    </div>

    <main class="page-wrap">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">© {{ current_year }} Party Planner</footer>
</body>
</html>
