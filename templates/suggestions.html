{% extends "layout.html" %}
{% block content %}
<h3>Event Suggestions</h3>
<form method="POST" class="mb-4">
    <div class="input-group">
        <select name="event_type" class="form-select">
            {% for type in event_types %}
            <option value="{{ type }}" {% if selected_event == type %}selected{% endif %}>{{ type }}</option>
            {% endfor %}
        </select>
        <button class="btn btn-primary">Get Tips</button>
    </div>
</form>

<div class="row">
    {% for s in suggestions %}
    <div class="col-md-4 mb-3">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="display-4 mb-2">{{ s.icon }}</div>
                <h5 class="card-title">{{ s.service }}</h5>
                <p class="card-text">{{ s.reason }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
