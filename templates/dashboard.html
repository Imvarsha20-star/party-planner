{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow mb-4">
            <div class="card-body">
                <h4 class="mb-3">Book an Event</h4>
                <form action="/book" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Event Type</label>
                        <select name="event_type" class="form-select" required>
                            <option value="" disabled selected>Select event type...</option>
                            <option value="Birthday">Birthday Party</option>
                            <option value="Wedding">Wedding</option>
                            <option value="Anniversary">Anniversary</option>
                            <option value="Corporate">Corporate Event</option>
                            <option value="Concert">Concert</option>
                            <option value="Baby Shower">Baby Shower</option>
                            <option value="Graduation">Graduation</option>
                            <option value="Theme Party">Theme Party</option>
                            <option value="Conference">Conference</option>
                            <option value="Fundraiser">Fundraiser</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Venue</label>
                        <select name="venue" class="form-select">
                            <option value="Hall">Hall ($1000)</option>
                            <option value="Garden">Garden ($800)</option>
                            <option value="Beach">Beach ($1200)</option>
                            <option value="Rooftop">Rooftop ($1500)</option>
                            <option value="Banquet Center">Banquet Center ($2000)</option>
                            <option value="Club">Club ($1800)</option>
                            <option value="Hotel Ballroom">Ballroom ($2500)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="party_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Time Slot</label>
                        <select name="time_slot" class="form-select">
                            <option>Morning (9 AM - 12 PM)</option>
                            <option>Afternoon (1 PM - 4 PM)</option>
                            <option>Evening (6 PM - 10 PM)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">Additional Services</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="catering" id="s1">
                            <label class="form-check-label" for="s1">Catering ($500)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="decoration" id="s2">
                            <label class="form-check-label" for="s2">Decor ($300)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" name="photography" id="s3">
                            <label class="form-check-label" for="s3">Photo ($400)</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Confirm Booking</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <h3>Your Bookings</h3>
        <div class="table-responsive">
            <table class="table table-hover bg-white shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>Event</th>
                        <th>Venue</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for booking in bookings %}
                    <tr>
                        <td>{{ booking.event }}</td>
                        <td>{{ booking.venue }}</td>
                        <td>{{ booking.party_date }}</td>
                        <td>${{ booking.total_cost }}</td>
                        <td><a href="/invoice/{{ booking.invoice_id }}" class="btn btn-sm btn-outline-primary">Invoice</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
